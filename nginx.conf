events { worker_connections 1024; }

http {
    upstream agent_pool {
        server agent:8000;
    }

    server {
        listen 80;

        location / {
            proxy_pass         http://agent_pool;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }
    }
}
