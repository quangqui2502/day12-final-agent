services:
  - type: web
    name: day12-final-agent
    runtime: docker
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: AGENT_API_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: agent-redis
          property: connectionString
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: MONTHLY_BUDGET_USD
        value: "10.0"

  - type: redis
    name: agent-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
